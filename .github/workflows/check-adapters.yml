name: Check Adapters

permissions:
  contents: write

on:
  push:
    branches:
      - '**'  # Run on all branches
  schedule:
    # Runs every 1 hour (schedule always runs on default branch, i.e. master)
    - cron: "0 */1 * * *"
  workflow_dispatch:

jobs:
  run-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Update submodule
        run: |
          # Read the branch from .gitmodules (default to master if not found)
          SUBMODULE_BRANCH=$(git config -f .gitmodules submodule.euler-interfaces.branch || echo "master")
          echo "Using euler-interfaces branch: $SUBMODULE_BRANCH"
          
          # Initialize and update submodule to the specified branch
          git submodule sync
          git submodule update --init --remote euler-interfaces
          
          # Verify the submodule is on the correct branch
          cd euler-interfaces
          git fetch origin "$SUBMODULE_BRANCH"
          git checkout "origin/$SUBMODULE_BRANCH"
          cd ..

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Generate .env file
        run: |
          echo '${{ secrets.RPC_URLS }}' > .env
          echo "EULER_DATA_API_URL=${{ secrets.EULER_DATA_API_URL }}" >> .env

      - name: Install dependencies
        run: npm ci

      - name: Force latest oracle-sdk from main
        run: |
          npm remove @objectivelabs/oracle-sdk || true
          npm install @objectivelabs/oracle-sdk@github:euler-xyz/oracle-sdk#main --prefer-online --no-audit --no-fund

      - name: Run checks
        run: npm run start

      - name: Commit and push if changed
        if: github.ref == 'refs/heads/master'
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add -f data/
          if ! git diff --cached --quiet; then
            git commit -m "Update adapter check results"
            git push origin HEAD:master
          fi

      # Sync full /data folder to S3 (master only)
      # Syncs to master/ folder so --delete doesn't affect other branch folders
      # - name: Sync data to S3 (master)
      #   if: success() && github.ref == 'refs/heads/master'
      #   run: |
      #     aws s3 sync data/ "s3://${{ secrets.AWS_S3_BUCKET }}/master/" --delete
      #   env:
      #     AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     AWS_REGION: ${{ secrets.AWS_REGION }}

      # Upload branch-specific all.json to S3 (non-master branches only, not tags)
      - name: Sync data to S3 (non-master branches)
        if: success() && github.ref != 'refs/heads/master' && startsWith(github.ref, 'refs/heads/')
        run: |
          # Extract branch name from refs/heads/branch-name
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          
          # Sanitize branch name for filename (replace / with -)
          SAFE_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/\//-/g')

          # Sync data to S3 (--delete only affects files within this branch folder)
          aws s3 sync data/ "s3://${{ secrets.AWS_S3_BUCKET }}/${SAFE_BRANCH_NAME}/" --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      # 🆕 Notify Slack if the workflow fails
