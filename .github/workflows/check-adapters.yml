name: Check Adapters

permissions:
  contents: write

on:
  push:
    branches:
      - "**" # Run on all branches
  schedule:
    # Runs every 1 hour (schedule always runs on default branch, i.e. master)
    - cron: "0 */1 * * *"
  workflow_dispatch:

jobs:
  run-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Update submodule
        run: |
          # Read the branch from .gitmodules (default to master if not found)
          SUBMODULE_BRANCH=$(git config -f .gitmodules submodule.euler-interfaces.branch || echo "master")
          echo "Using euler-interfaces branch: $SUBMODULE_BRANCH"

          # Initialize and update submodule to the specified branch
          git submodule sync
          git submodule update --init --remote euler-interfaces

          # Verify the submodule is on the correct branch
          cd euler-interfaces
          git fetch origin "$SUBMODULE_BRANCH"
          git checkout "origin/$SUBMODULE_BRANCH"
          cd ..

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Generate .env file
        run: |
          echo '${{ secrets.RPC_URLS }}' > .env
          echo "EULER_DATA_API_URL=${{ secrets.EULER_DATA_API_URL }}" >> .env

      - name: Install dependencies
        run: npm ci

      - name: Force latest oracle-sdk from main
        run: |
          npm remove @objectivelabs/oracle-sdk || true
          npm install @objectivelabs/oracle-sdk@github:euler-xyz/oracle-sdk#main --prefer-online --no-audit --no-fund

      - name: Run checks
        run: npm run start

      - name: Commit and push if changed
        if: github.ref == 'refs/heads/master'
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add -f data/
          if ! git diff --cached --quiet; then
            git commit -m "Update adapter check results"
            git push origin HEAD:master
          fi

      - name: Configure AWS credentials
        if: success() && startsWith(github.ref, 'refs/heads/')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Sync data to S3 (master branch - sync each chainId folder to root to avoid deleting branch folders)
      - name: Sync data to S3 (master)
        if: success() && github.ref == 'refs/heads/master'
        run: |
          # Sync each chainId folder individually with --delete
          # This avoids deleting other root-level folders (like branch folders)
          for chainDir in data/*/; do
            chainId=$(basename "$chainDir")
            echo "Syncing chain $chainId to root..."
            aws s3 sync "$chainDir" "s3://${{ secrets.AWS_S3_BUCKET }}/${chainId}/" --delete
          done

      # Sync data to S3 (non-master branches - sync to branch folder)
      - name: Sync data to S3 (non-master branches)
        if: success() && github.ref != 'refs/heads/master' && startsWith(github.ref, 'refs/heads/')
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          # Sanitize branch name (replace / with -)
          SAFE_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
          echo "Syncing to branch folder: $SAFE_BRANCH_NAME"
          aws s3 sync data/ "s3://${{ secrets.AWS_S3_BUCKET }}/${SAFE_BRANCH_NAME}/" --delete

      # 🆕 Notify Slack if the workflow fails
      - name: Notify Slack on failure
        if: failure() && github.ref == 'refs/heads/master'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          msg="❌ Check Adapters workflow failed on ${{ github.ref_name }} in ${{ github.repository }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          payload=$(jq -n --arg text "$msg" '{text: $text}')
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
